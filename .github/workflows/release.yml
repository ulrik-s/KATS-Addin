name: Release

# Builds the bundle and publishes it to GitHub Pages on every tag push
# matching `v*`. The same workflow attaches `manifest.xml` to a GitHub
# Release for the M365 admin upload step.
#
# Trigger workflow:
#   git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build bundle + manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Enable Corepack
        run: corepack enable

      - name: Compute version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        env:
          KATS_VERSION: ${{ steps.version.outputs.version }}
          KATS_HOST_URL: https://ulrik-s.github.io/KATS-Addin
        run: yarn build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload manifest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifest
          path: dist/manifest.xml

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  github-release:
    name: Create GitHub Release with manifest
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest
          path: artifact

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/manifest.xml
          generate_release_notes: true
          fail_on_unmatched_files: true
